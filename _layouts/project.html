---
layout: default
---
<article class="project">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="project-description">{{ page.description }}</p>{% endif %}
    {% if page.link %}<a href="{{ page.link }}" class="project-link">View Project →</a>{% endif %}
  </header>
  <div class="project-content">
    {{ content }}
  </div>
</article>
